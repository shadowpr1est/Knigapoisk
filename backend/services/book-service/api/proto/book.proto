syntax = "proto3";

package book;

option go_package = "github.com/shadowpr1est/knigapoisk-book-service/api/proto;bookpb";

service BookService {
  rpc GetBook(GetBookRequest) returns (GetBookResponse);
  rpc ListBooks(ListBooksRequest) returns (ListBooksResponse);
  rpc CreateBook(CreateBookRequest) returns (CreateBookResponse);
  rpc UpdateBook(UpdateBookRequest) returns (UpdateBookResponse);
  rpc DeleteBook(DeleteBookRequest) returns (DeleteBookResponse);
  rpc GetBooksByAuthor(GetBooksByAuthorRequest) returns (GetBooksByAuthorResponse);
  rpc GetBooksByGenre(GetBooksByGenreRequest) returns (GetBooksByGenreResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message Author {
  int64 id = 1;
  string name = 2;
  string bio = 3;
  int32 born_year = 4;
}

message Genre {
  int64 id = 1;
  string name = 2;
}

enum BookStatus {
  BOOK_STATUS_UNSPECIFIED = 0;
  BOOK_STATUS_ACTIVE = 1;
  BOOK_STATUS_HIDDEN = 2;
}

message Book {
  int64 id = 1;
  string title = 2;
  string description = 3;
  string language = 4;
  string published_at = 5;
  string cover_url = 6;
  int64 file_id = 7;
  BookStatus status = 8;
  string created_at = 9;
  string updated_at = 10;
  repeated Author authors = 11;
  repeated Genre genres = 12;
}

message GetBookRequest {
  int64 id = 1;
}

message GetBookResponse {
  Book book = 1;
}

message ListBooksRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListBooksResponse {
  repeated Book books = 1;
  int64 total = 2;
}

message CreateBookRequest {
  string title = 1;
  string description = 2;
  string language = 3;
  string published_at = 4;
  string cover_url = 5;
  int64 file_id = 6;
  BookStatus status = 7;
  repeated int64 author_ids = 8;
  repeated int64 genre_ids = 9;
}

message CreateBookResponse {
  int64 id = 1;
}

message UpdateBookRequest {
  int64 id = 1;
  string title = 2;
  string description = 3;
  string language = 4;
  string published_at = 5;
  string cover_url = 6;
  int64 file_id = 7;
  BookStatus status = 8;
  repeated int64 author_ids = 9;
  repeated int64 genre_ids = 10;
}

message UpdateBookResponse {
  Book book = 1;
}

message DeleteBookRequest {
  int64 id = 1;
}

message DeleteBookResponse {
  bool success = 1;
}

message GetBooksByAuthorRequest {
  int64 author_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message GetBooksByAuthorResponse {
  repeated Book books = 1;
  int64 total = 2;
}

message GetBooksByGenreRequest {
  int64 genre_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message GetBooksByGenreResponse {
  repeated Book books = 1;
  int64 total = 2;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
}

